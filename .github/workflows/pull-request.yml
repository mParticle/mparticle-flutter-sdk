name: Build and Test
on:
  push:
  pull_request:
defaults:
  run:
    shell: bash
env:
  PUB_ENVIRONMENT: bot.github
  # pinned to latest stable version
  FLUTTER_SDK_VERSION: 3.19.3

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_SDK_VERSION }}
          channel: "stable"
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Run tests
        run: flutter test
      - name: Cleanup
        if: ${{ always() }}
        run: |
          if command -v flutter &>/dev/null; then
            flutter clean
          fi
  build-android:
    needs: test
    name: Build Android flutter app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_SDK_VERSION }}
          channel: "stable"
          cache: true
      - name: Install example dependencies
        working-directory: example
        run: flutter pub get
      - name: Test example
        working-directory: example
        run: flutter test
      - name: Build example APK
        working-directory: example
        run: flutter build apk
      - name: Check if example APK exists
        working-directory: example
        run: |
          set -e
          if [ ! -f build/app/outputs/apk/release/app-release.apk ]; then
            echo "APK file not found!"
            exit 1
          fi
      - name: Build example App Bundle
        working-directory: example
        run: flutter build appbundle
      - name: Check if example App Bundle exists
        working-directory: example
        run: |
          set -e
          if [ ! -f build/app/outputs/bundle/release/app-release.aab ]; then
            echo "App Bundle not found!"
            exit 1
          fi
      - name: Cleanup
        if: ${{ always() }}
        working-directory: example
        run: |
          rm -rf build
          if command -v flutter &>/dev/null; then
            flutter clean
          fi
  build-ios:
    needs: test
    name: Build iOS flutter app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: "16.4"
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_SDK_VERSION }}
          channel: "stable"
          cache: true
      - name: Install example dependencies
        working-directory: example
        run: flutter pub get
      - name: Test
        working-directory: example
        run: flutter test
      - name: Build example iOS app
        working-directory: example
        run: |
          flutter pub get
          flutter build ios --config-only --no-codesign --release
          cd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -quiet
      - name: Cleanup
        if: ${{ always() }}
        working-directory: example
        run: |
          rm -rf build
          if command -v flutter &>/dev/null; then
            flutter clean
          fi
  build-web:
    needs: test
    name: Build web flutter app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_SDK_VERSION }}
          channel: "stable"
          cache: true
      - name: Install example dependencies
        working-directory: example
        run: flutter pub get
      - name: Test example
        working-directory: example
        run: flutter test
      - name: Build example web
        working-directory: example
        run: flutter build web
      - name: Check if example web exists
        working-directory: example
        run: |
          set -e
          if [ ! -f build/web/flutter.js ]; then
            echo "Web build not found!"
            exit 1
          fi
      - name: Cleanup
        if: ${{ always() }}
        working-directory: example
        run: |
          rm -rf build
          if command -v flutter &>/dev/null; then
            flutter clean
          fi
