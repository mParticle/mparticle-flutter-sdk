name: Release SDK

on:
  push:
    branches:
      - main
    paths:
      - VERSION

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ vars.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Run tests
        run: flutter test

  build-android:
    name: Build Android
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ vars.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install example dependencies
        working-directory: example
        run: flutter pub get
      - name: Build example APK
        working-directory: example
        run: flutter build apk

  build-ios:
    name: Build iOS
    needs: test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ vars.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install example dependencies
        working-directory: example
        run: flutter pub get
      - name: Build example iOS app
        working-directory: example
        run: flutter build ios --no-codesign --release
        env:
          CODE_SIGNING_ALLOWED: "NO"

  setup-and-version:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    outputs:
      final_version: ${{ steps.version-file.outputs.release-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Get current version
        id: version-file
        run: |
          version_from_file=$(head -n 1 VERSION)
          echo "release-version=$version_from_file" >> $GITHUB_OUTPUT

  release-and-tag:
    needs: [setup-and-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ vars.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Create git tag
        run: |
          git tag "v${{ needs.setup-and-version.outputs.final_version }}"
          git push origin "v${{ needs.setup-and-version.outputs.final_version }}"

      - name: Publish Package
        run: |
          flutter pub publish --force

      - uses: ffurrer2/extract-release-notes@v2
        id: extract-release-notes
        with:
          changelog_file: CHANGELOG.md
          release_notes_file: ${{ needs.setup-and-version.outputs.final_version }}.md

      - name: Create Github release
        uses: ncipollo/release-action@v1
        with:
          makeLatest: true
          tag: v${{ needs.setup-and-version.outputs.final_version }}
          body: |
            ## Release notes:
            ${{ steps.extract-release-notes.outputs.release_notes }}
